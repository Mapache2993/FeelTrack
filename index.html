<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeelTrack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎵 FeelTrack</h1>

    <h2>Encuentra tu vibra</h2>

    <p class="descripcion">
        Descubre canciones, álbumes y emociones que conectan contigo.
    </p>

    <select id="tipoBusqueda">
        <option value="cancion">Canción</option>
        <option value="album">Álbum</option>
        <option value="emocion">Emoción o situación</option>
    </select>

    <input
        type="text"
        id="entrada"
        placeholder="¿Qué estás buscando?"
    >

    <button onclick="buscarMusica()">
        Buscar
    </button>

    <div id="resultados"></div>

</div>

<script src="script.js"></script>

</body>
</html>
